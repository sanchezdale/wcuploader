name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-vulnerability-scan:
    name: Dependency vulnerability scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --allow-no-lockfiles
        --recursive
        ./
      upload-sarif: false
      fail-on-vuln: true

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Run gitleaks
        uses: docker://zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
        with:
          args: detect --source=/github/workspace --no-git --redact --verbose --no-banner

  trufflehog-secret-scan:
    name: TruffleHog verified secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          extra_args: --results=verified

  workflow-security:
    name: GitHub Actions workflow audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727
        with:
          advanced-security: false
          annotations: true
          min-severity: medium
          min-confidence: medium
